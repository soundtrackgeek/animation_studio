name: Windows Installer

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-package:
    name: Verify and package
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add clippy rustfmt

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify frontend
        run: npm run check

      - name: Build static preview
        run: npm run build

      - name: Verify static preview worker
        run: npm run test:sites

      - name: Verify Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Lint Rust
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test Rust
        working-directory: src-tauri
        run: cargo test --all-features

      - name: Build Windows installer
        run: npm run tauri:build

      - name: Create installer checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installer) {
            throw "The Tauri build did not produce an NSIS setup executable."
          }
          $hash = (Get-FileHash -Algorithm SHA256 $installer.FullName).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" |
            Set-Content -NoNewline -Encoding utf8 "$($installer.FullName).sha256"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: graphite-forge-windows-${{ github.run_number }}-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sha256
          if-no-files-found: error
          retention-days: 14
