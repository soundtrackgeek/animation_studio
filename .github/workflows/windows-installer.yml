name: Windows Installer

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-package:
    name: Verify and package
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add clippy rustfmt

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify release tag matches app version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $packageVersion = (Get-Content "package.json" | ConvertFrom-Json).version
          $tauriVersion = (Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json).version
          $expectedTag = "v$packageVersion"
          if ($packageVersion -ne $tauriVersion) {
            throw "package.json ($packageVersion) and tauri.conf.json ($tauriVersion) do not match."
          }
          if ("${{ github.ref_name }}" -ne $expectedTag) {
            throw "Release tag ${{ github.ref_name }} does not match app version $packageVersion."
          }

      - name: Verify frontend
        run: npm run check

      - name: Build static preview
        run: npm run build

      - name: Verify static preview worker
        run: npm run test:sites

      - name: Verify updater release metadata
        run: npm run test:updater-release

      - name: Verify Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Lint Rust
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test Rust
        working-directory: src-tauri
        run: cargo test --all-features

      - name: Build Windows installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build:release

      - name: Prepare signed updater assets
        run: node scripts/prepare-updater-release.mjs

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: graphite-forge-windows-${{ github.run_number }}-${{ github.sha }}
          path: dist/release/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify-and-package
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download verified installer
        uses: actions/download-artifact@v8
        with:
          name: graphite-forge-windows-${{ github.run_number }}-${{ github.sha }}
          path: release-assets

      - name: Publish installer release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release-assets/* \
            --verify-tag \
            --generate-notes \
            --title "Graphite Forge $GITHUB_REF_NAME" \
            --notes "Download the Windows setup executable below. This early build is not code-signed, so Windows may show a SmartScreen warning." \
            --latest
